# ─── Docker Compose: Full Stack ───────────────────────────────
# Spins up PostgreSQL (master + read replica), Redis, API server, and client

x-server-env: &server-env
  DATABASE_URL: "postgresql://postgres:postgres123@postgres-master:5432/bounty_platform"
  DATABASE_READ_URL: "postgresql://postgres:postgres123@postgres-replica:5432/bounty_platform"
  REDIS_URL: "redis://redis-master:6379"
  REDIS_READ_URL: "redis://redis-replica:6379"
  MONGODB_URL: "mongodb://mongo-catalog:27017"
  MONGODB_DB: "bounty_catalog"
  MONGODB_CATALOG_COLLECTION: "bounty_catalog"
  BOUNTY_EVENT_STREAM: "events:bounty"
  CATALOG_SYNC_GROUP: "catalog-sync"
  JWT_SECRET: "docker-jwt-secret-change-in-production"
  JWT_EXPIRES_IN: "7d"
  PORT: 5000
  NODE_ENV: development
  CLIENT_URL: "http://localhost:3000"

services:
  # ── PostgreSQL Master ──────────────────────────────────────
  postgres-master:
    image: bitnamilegacy/postgresql:16
    container_name: bounty-postgres-master
    environment:
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: repl_user
      POSTGRESQL_REPLICATION_PASSWORD: repl_password
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: postgres123
      POSTGRESQL_DATABASE: bounty_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata-master:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bounty_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── PostgreSQL Read Replica ──────────────────────────────────
  postgres-replica:
    image: bitnamilegacy/postgresql:16
    container_name: bounty-postgres-replica
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: repl_user
      POSTGRESQL_REPLICATION_PASSWORD: repl_password
      POSTGRESQL_MASTER_HOST: postgres-master
      POSTGRESQL_MASTER_PORT_NUMBER: 5432
      # The missing variable required for Bitnami replica initialization
      POSTGRESQL_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - pgdata-replica:/bitnami/postgresql
    depends_on:
      postgres-master:
        condition: service_healthy
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U postgres -d bounty_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis Master ───────────────────────────────────────────
  redis-master:
    image: redis:7-alpine
    container_name: bounty-redis
    ports:
      # Maps host 6369 to container internal 6379
      - "6369:6379"
    volumes:
      - redis_master:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis Replica ──────────────────────────────────────────
  redis-replica:
    image: redis:7-alpine
    container_name: bounty-redis-replica
    ports:
      # Maps host 6380 to container internal 6379
      - "6380:6379"
    volumes:
      - redis_replica:/data
    # Replicates from the master's internal container port
    command: redis-server --replicaof redis-master 6379
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  # ── Backend API Server ─────────────────────────────────────
  # MongoDB Catalog Read Model
  mongo-catalog:
    image: mongo:7
    container_name: bounty-mongo-catalog
    ports:
      - "27017:27017"
    volumes:
      - mongo_catalog:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-init:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: sh -c "npx prisma db push --skip-generate && node scripts/wait-for-read-model.js && node prisma/seed.js && node scripts/wait-for-read-model.js --seeded"
    environment:
      <<: *server-env
    depends_on:
      postgres-master:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
    volumes:
      - ./server/prisma:/app/prisma
    restart: "no"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    expose:
      - "5000"
    environment:
      <<: *server-env
      ENABLE_EMBEDDED_SYNC_WORKER: "false"
      READ_MODEL_REBUILD_ON_START: "false"
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
      mongo-catalog:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma

  # ── Frontend Client ────────────────────────────────────────
  catalog-sync-worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: sh -c "node scripts/wait-for-read-model.js --seeded && node src/workers/catalogSyncWorker.js"
    environment:
      <<: *server-env
      CATALOG_SYNC_CONSUMER: "catalog-sync-worker"
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis-master:
        condition: service_healthy
      mongo-catalog:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: bounty-client
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://server:5000"
    depends_on:
      - server

  # Local Edge / Reverse Proxy
  edge:
    image: nginx:1.27-alpine
    container_name: bounty-edge
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server

volumes:
  pgdata-master:
  pgdata-replica:
  redis_master:
  redis_replica:
  mongo_catalog:
