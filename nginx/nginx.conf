upstream api_backend {
    server server:5000;
    # To scale: docker compose up --scale server=N
    # Add additional entries here for static multi-server config
}

upstream client_frontend {
    server client:3000;
}

server {
    listen 80;
    server_name localhost;

    # Proxy headers — required for Express to see correct client IP
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API traffic → Transaction/Discovery service
    location /api/ {
        proxy_pass         http://api_backend;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Everything else → Next.js frontend
    location / {
        proxy_pass         http://client_frontend;
        proxy_read_timeout 30s;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
