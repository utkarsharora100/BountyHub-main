upstream api_backend {
    server server:5000;
    keepalive 32;
}

upstream client_frontend {
    server client:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name localhost;

    # Use Docker's embedded DNS so upstream IPs are re-resolved after container
    # rebuilds instead of being cached for the lifetime of the nginx process.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy headers — required for Express to see correct client IP
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Reuse upstream keep-alive connections
    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    # API traffic → Transaction/Discovery service
    location /api/ {
        proxy_pass         http://api_backend;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # Everything else → Next.js frontend
    location / {
        proxy_pass         http://client_frontend;
        proxy_read_timeout 30s;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $http_upgrade;
    }
}
